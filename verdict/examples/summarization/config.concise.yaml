# Run config: a concise summarizer evaluated offline with the mock provider.
# Swap `provider: mock` for `provider: litellm` + a `model:` to use a real model.
target:
  name: concise-summarizer
  provider: mock
  variant: concise
  system: You are a concise summarizer.
  prompt: |
    Summarize the following text in one short sentence:
    {input}

dataset: dataset.yaml

evaluators:
  - type: length
    min_words: 4
    max_words: 25
  - type: judge
    name: faithfulness
    rubric: |
      5 = faithful and concise; 3 = acceptable; 1 = unfaithful or empty.
    scale: 5
    threshold: 3
    judge:
      provider: mock
      variant: judge
