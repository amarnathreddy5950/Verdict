# Same dataset and evaluators, a more verbose summarizer -- to compare against concise.
target:
  name: verbose-summarizer
  provider: mock
  variant: verbose
  system: You are a thorough summarizer.
  prompt: |
    Summarize the following text:
    {input}

dataset: dataset.yaml

evaluators:
  - type: length
    min_words: 4
    max_words: 25
  - type: judge
    name: faithfulness
    rubric: |
      5 = faithful and concise; 3 = acceptable; 1 = unfaithful or empty.
    scale: 5
    threshold: 3
    judge:
      provider: mock
      variant: judge
